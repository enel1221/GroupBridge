version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, go]
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: maven
    directory: /extensions/keycloak-event-listener
    schedule:
      interval: weekly
    labels: [dependencies, java]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, containers]
  - package-ecosystem: docker
    directory: /extensions/keycloak-event-listener
    schedule:
      interval: weekly
    labels: [dependencies, containers]
