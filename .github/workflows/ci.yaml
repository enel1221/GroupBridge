name: CI and release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  verify:
    name: Test and validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: |
          test -z "$(gofmt -l cmd internal)"
          go vet ./...
          go test -race -coverprofile=coverage.out ./...

      - name: Build controller
        run: docker build --build-arg VERSION=ci --build-arg COMMIT="${GITHUB_SHA}" -t groupbridge:ci .

      - name: Test and build Keycloak extension artifact
        run: docker build -t groupbridge-keycloak-extension:ci extensions/keycloak-event-listener

      - name: Build customized Keycloak runtime
        run: >-
          docker build
          --build-arg PROVIDER_IMAGE=groupbridge-keycloak-extension:ci
          -t groupbridge-keycloak:ci
          -f deploy/keycloak/Dockerfile .

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends shellcheck

      - name: Check shell scripts
        run: shellcheck hack/*.sh hack/lib/*.sh

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint and render Helm chart
        run: |
          helm lint --strict charts/groupbridge
          helm template groupbridge charts/groupbridge \
            --namespace groupbridge \
            > /tmp/groupbridge.yaml

      - name: Package Helm chart
        run: helm package charts/groupbridge --destination dist

      - name: Upload test evidence and chart
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: groupbridge-ci
          path: |
            coverage.out
            dist/*.tgz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish OCI images and chart
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA:0:12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            image_tags="${version} latest sha-${short_sha}"
            chart_version="${version}"
          else
            version="sha-${short_sha}"
            image_tags="edge sha-${short_sha}"
            chart_version="0.1.0-main.${GITHUB_RUN_NUMBER}"
          fi
          {
            echo "owner=${owner}"
            echo "version=${version}"
            echo "image_tags=${image_tags}"
            echo "chart_version=${chart_version}"
          } >>"${GITHUB_OUTPUT}"

      - name: Sign in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Build release images
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          OWNER: ${{ steps.meta.outputs.owner }}
        run: |
          docker build \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "COMMIT=${GITHUB_SHA}" \
            -t "ghcr.io/${OWNER}/groupbridge:build" .
          docker build \
            -t groupbridge-keycloak-extension:build \
            extensions/keycloak-event-listener
          docker build \
            --build-arg PROVIDER_IMAGE=groupbridge-keycloak-extension:build \
            -t "ghcr.io/${OWNER}/groupbridge-keycloak:build" \
            -f deploy/keycloak/Dockerfile .

      - name: Push release images
        env:
          OWNER: ${{ steps.meta.outputs.owner }}
          IMAGE_TAGS: ${{ steps.meta.outputs.image_tags }}
        run: |
          for tag in ${IMAGE_TAGS}; do
            docker tag "ghcr.io/${OWNER}/groupbridge:build" "ghcr.io/${OWNER}/groupbridge:${tag}"
            docker tag "ghcr.io/${OWNER}/groupbridge-keycloak:build" "ghcr.io/${OWNER}/groupbridge-keycloak:${tag}"
            docker push "ghcr.io/${OWNER}/groupbridge:${tag}"
            docker push "ghcr.io/${OWNER}/groupbridge-keycloak:${tag}"
          done

      - name: Package and publish Helm chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ steps.meta.outputs.owner }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHART_VERSION: ${{ steps.meta.outputs.chart_version }}
        run: |
          mkdir -p dist
          helm package charts/groupbridge \
            --destination dist \
            --version "${CHART_VERSION}" \
            --app-version "${VERSION}"
          echo "${GHCR_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
          helm push dist/groupbridge-*.tgz "oci://ghcr.io/${OWNER}/charts"

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/groupbridge-*.tgz --generate-notes --verify-tag
