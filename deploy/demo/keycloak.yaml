apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: groupbridge-demo
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: groupbridge-demo
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: groupbridge-demo
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: groupbridge-demo
spec:
  serviceName: keycloak
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: groupbridge-demo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 0
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: groupbridge-keycloak:dev
          imagePullPolicy: Never
          args:
            - start
            - --optimized
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              value: groupbridge
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: postgres-password
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: keycloak-admin-username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: keycloak-admin-password
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_SPI_EVENTS_LISTENER__GROUPBRIDGE__WEBHOOK_URL
              value: http://groupbridge:8080/v1/events/keycloak
            - name: KC_SPI_EVENTS_LISTENER__GROUPBRIDGE__WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: webhook-secret
            - name: KC_SPI_EVENTS_LISTENER__GROUPBRIDGE__ALLOW_INSECURE_HTTP
              value: "true"
            - name: KC_SPI_EVENTS_LISTENER__GROUPBRIDGE__CONNECT_TIMEOUT_MS
              value: "2000"
            - name: KC_SPI_EVENTS_LISTENER__GROUPBRIDGE__REQUEST_TIMEOUT_MS
              value: "5000"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
      terminationGracePeriodSeconds: 30
